<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>AJAX - API - JSON</title>
</head>
<body>
  <div id="ajax"></div>
  <input type="button" onclick="fetch_api()" value="Fetch API">

  <script>
    function fetch_api() {
      fetch("https://jsonplaceholder.typicode.com/posts")
        .then(response => response.json())
        .then(data => {
          // Lấy 3 bài viết đầu tiên
          const firstThree = data.slice(0, 3);
          let htmlContent = "";

          firstThree.forEach(post => {
            htmlContent += `<h3>${post.title}</h3><p>${post.body}</p><hr>`;
          });

          document.getElementById("ajax").innerHTML = htmlContent;
        })
        .catch(error => {
          console.error("Lỗi khi gọi API:", error);
          document.getElementById("ajax").innerHTML = "Không thể tải dữ liệu.";
        });
    }
  </script>
</body>
</html>
