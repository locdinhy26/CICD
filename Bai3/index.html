<!-- Form thêm sinh viên -->
<form id="studentForm">
  <input type="text" id="studentId" placeholder="Mã SV">
  <input type="text" id="studentName" placeholder="Tên SV">
  <input type="text" id="studentClass" placeholder="Lớp">
  <input type="number" id="studentScore" placeholder="Điểm">
  <button type="submit">Thêm</button>
</form>

<!-- Thanh tìm kiếm -->
<input type="text" id="searchInput" placeholder="Tìm kiếm sinh viên...">

<!-- Bảng danh sách -->
<table>
  <thead>
    <tr>
      <th>Mã SV</th>
      <th>Tên SV</th>
      <th>Lớp</th>
      <th>Điểm</th>
    </tr>
  </thead>
  <tbody id="studentTbody"></tbody>
</table>
