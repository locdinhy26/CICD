<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Student Management Dashboard</title>
    <!-- Thêm Font Inter và Remix Icon -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <body>
    <header class="topbar">
      <div class="brand">
        <i class="ri-dashboard-3-line"></i>
        <h1>Student Dashboard</h1>
      </div>
      <button id="themeToggle" type="button" class="btn icon-btn" title="Đổi giao diện">
        <i class="ri-sun-line" id="themeIcon"></i>
        <span>Theme</span>
      </button>
    </header>

    <main class="container">
      <!-- Form Section -->
      <section class="card">
        <div class="card-header">
          <h2><i class="ri-user-add-line"></i> Thêm sinh viên</h2>
        </div>
        <form id="studentForm" class="grid" autocomplete="off">
          <div class="form-group">
            <label for="studentId">Mã SV</label>
            <input id="studentId" required placeholder="VD: SV001" />
          </div>
          <div class="form-group">
            <label for="studentName">Họ tên</label>
            <input id="studentName" required placeholder="VD: Nguyen Van A" />
          </div>
          <div class="form-group">
            <label for="studentClass">Lớp</label>
            <input id="studentClass" required placeholder="VD: D21CQCN01" />
          </div>
          <div class="form-group">
            <label for="studentScore">Điểm (0-10)</label>
            <input id="studentScore" type="number" min="0" max="10" step="0.1" required placeholder="0.0" />
          </div>
          
          <div class="row full-width actions">
            <button class="btn primary" type="submit">
              <i class="ri-add-circle-line"></i> Thêm mới
            </button>
            <button class="btn secondary" type="reset">
              <i class="ri-refresh-line"></i> Nhập lại
            </button>
          </div>
          <p id="formError" class="error" aria-live="polite"></p>
        </form>
      </section>

      <!-- Table Section -->
