name: CI/CD Pipeline - Build, Test & Deploy

on:
  push:
    branches:
      - main
      - develop

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # ╔══════════════════════════════════════╗
  # ║  STAGE 1: BUILD                      ║
  # ║  Checkout code + chuẩn bị thư mục   ║
  # ╚══════════════════════════════════════╝
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build - Prepare Public Folder
        run: |
          echo "🔨 Building the project..."
          echo "Build started at: $(date)"
          mkdir -p public
          cp -r bAI7/public/. public/
          echo "📂 Build output:"
          ls -la public/
          ls -la public/js/ || true
          echo "✅ Build completed!"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: website-build
          path: ./public

  # ╔══════════════════════════════════════╗
  # ║  STAGE 2: TEST                       ║
  # ║  Kiểm tra files tồn tại + validate  ║
  # ╚══════════════════════════════════════╝
  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: website-build
          path: ./public

      - name: Test - Check index.html exists
        run: |
          echo "🧪 Running tests..."
          echo "---"
          echo "Test 1: Checking index.html..."
          test -f public/index.html && echo "✅ PASS: index.html exists" || (echo "❌ FAIL: index.html not found" && exit 1)

      - name: Test - Check styles.css exists
        run: |
          echo "Test 2: Checking styles.css..."
          test -f public/styles.css && echo "✅ PASS: styles.css exists" || (echo "❌ FAIL: styles.css not found" && exit 1)

      - name: Test - Check main.js exists
        run: |
          echo "Test 3: Checking js/main.js..."
          test -f public/js/main.js && echo "✅ PASS: js/main.js exists" || (echo "❌ FAIL: js/main.js not found" && exit 1)

      - name: Test - Validate HTML structure
        run: |
          echo "Test 4: Validating HTML structure..."
          grep -q "<title>" public/index.html && echo "✅ PASS: <title> tag found" || (echo "❌ FAIL: <title> tag missing" && exit 1)
          grep -q "<h1>" public/index.html && echo "✅ PASS: <h1> tag found" || (echo "❌ FAIL: <h1> tag missing" && exit 1)
          echo "---"
          echo "🎉 All tests passed!"

  # ╔══════════════════════════════════════╗
  # ║  STAGE 3: DEPLOY                     ║
  # ║  Deploy lên GitHub Pages             ║
  # ╚══════════════════════════════════════╝
  deploy:
    runs-on: ubuntu-latest
    needs: test
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: website-build
          path: ./public

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Deploy Summary
        run: |
          echo "🚀 Deployment completed!"
          echo "📅 Deployed at: $(date)"
          echo "🌐 Site URL: ${{ steps.deployment.outputs.page_url }}"